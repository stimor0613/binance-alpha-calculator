<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optimism 地址交易次数查询</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div>
          <h1>Optimism 地址交易次数查询</h1>
          <p class="subtitle">批量查询 Blockscout 交易次数，支持导出 CSV</p>
        </div>
        <div class="meta">
          数据源：<span class="tag">optimism.blockscout.com</span>
        </div>
      </header>

      <section class="card">
        <label for="addressInput" class="label">地址列表（每行一个）</label>
        <textarea
          id="addressInput"
          class="textarea"
          placeholder="0xabc...\n0xdef..."
        ></textarea>

        <div class="proxy-row">
          <label class="checkbox">
            <input type="checkbox" id="onlyIncoming" checked />
            仅统计转入（to=地址）
          </label>
        </div>

        <div class="proxy-row">
          <label for="workerUrl" class="label-inline">Worker 地址</label>
          <input
            id="workerUrl"
            class="input"
            type="text"
            placeholder="https://your-worker.your-subdomain.workers.dev"
          />
        </div>

        <div class="controls">
          <button id="btnQuery" class="btn primary">开始查询</button>
          <button id="btnCopy" class="btn" disabled>复制 CSV</button>
          <button id="btnDownload" class="btn" disabled>下载 CSV</button>
        </div>

        <div class="status">
          <span id="statusText">等待查询</span>
          <span id="statusHint" class="hint"></span>
        </div>
      </section>

      <section class="card">
        <div class="result-header">
          <h2>查询结果</h2>
          <div class="legend">
            <span class="dot ok"></span>成功
            <span class="dot fail"></span>失败
          </div>
        </div>
        <div class="table" id="resultTable">
          <div class="row header">
            <div>地址</div>
            <div>交易次数</div>
            <div>状态</div>
          </div>
        </div>
      </section>

      <footer class="footer">
        说明：仅统计该地址发起的交易次数（Blockscout transactions_count）。
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
